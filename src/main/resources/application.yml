server:
  port: 8080

spring:
  datasource:
    url: jdbc:postgresql://127.0.0.1:5433/signalops
    username: signalops
    password: signalops
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

jwt:
  secret: "${JWT_SECRET:signalops-dev-secret-CHANGE-ME-IF-YOU-CAN-minimum-123456-THIS-STRING-MUST-BE-AT-LEAST-64-CHARS}"
  expiration: 86400000
